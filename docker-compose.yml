version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novahair-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
